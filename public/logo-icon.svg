<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="planeFold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(109,40,217,0.25)"/>
      <stop offset="100%" stop-color="rgba(109,40,217,0.45)"/>
    </linearGradient>
    <filter id="planeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="800" height="800" rx="168" fill="url(#bg)"/>

  <!-- Subtle top-left inner glow -->
  <ellipse cx="280" cy="120" rx="380" ry="200" fill="rgba(255,255,255,0.07)"/>

  <!-- Paper plane — drawn pointing right, rotated –42° to aim upper-right -->
  <g transform="translate(418, 392) rotate(-42)" filter="url(#planeShadow)">
    <!-- Top wing: bright white -->
    <polygon points="178,0 -158,-108 -46,0" fill="white"/>
    <!-- Bottom wing: slightly translucent for depth -->
    <polygon points="178,0 -158,108 -46,0" fill="rgba(255,255,255,0.78)"/>
    <!-- Fold overlay (indigo tint on fold) -->
    <polygon points="-46,0 -158,108 178,0" fill="url(#planeFold)"/>
    <!-- Crease line -->
    <line x1="-46" y1="0" x2="178" y2="0" stroke="rgba(255,255,255,0.18)" stroke-width="2.5"/>
  </g>

  <!-- Speed / motion lines trailing from tail -->
  <rect x="105" y="563" width="132" height="13" rx="6.5" fill="rgba(255,255,255,0.52)"/>
  <rect x="88"  y="592" width="98"  height="10" rx="5"   fill="rgba(255,255,255,0.34)"/>
  <rect x="72"  y="617" width="66"  height="8"  rx="4"   fill="rgba(255,255,255,0.19)"/>

  <!-- Sparkle / glow at nose tip (world ≈ 545, 268 after rotate) -->
  <circle cx="545" cy="268" r="7"  fill="white" filter="url(#glow)"/>
  <circle cx="545" cy="268" r="16" fill="rgba(255,255,255,0.22)"/>
  <circle cx="545" cy="268" r="28" fill="rgba(255,255,255,0.09)"/>

  <!-- Four-point star at nose -->
  <path d="M545,256 L547,265 L558,268 L547,271 L545,280 L543,271 L532,268 L543,265 Z"
        fill="rgba(255,255,255,0.85)"/>
</svg>
