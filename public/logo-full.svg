<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 380" width="1180" height="380">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="380" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="planeFold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(109,40,217,0.25)"/>
      <stop offset="100%" stop-color="rgba(109,40,217,0.45)"/>
    </linearGradient>
    <filter id="ps2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="11" flood-color="rgba(0,0,0,0.26)"/>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- ─── Icon (scaled 0.475× from the 800×800 master) ─── -->
  <g transform="scale(0.4750)">
    <rect width="800" height="800" rx="168" fill="url(#bg2)"/>
    <ellipse cx="280" cy="120" rx="380" ry="200" fill="rgba(255,255,255,0.07)"/>
    <g transform="translate(418,392) rotate(-42)" filter="url(#ps2)">
      <polygon points="178,0 -158,-108 -46,0" fill="white"/>
      <polygon points="178,0 -158,108  -46,0" fill="rgba(255,255,255,0.78)"/>
      <polygon points="-46,0 -158,108  178,0" fill="url(#planeFold2)"/>
      <line x1="-46" y1="0" x2="178" y2="0" stroke="rgba(255,255,255,0.18)" stroke-width="2.5"/>
    </g>
    <rect x="105" y="563" width="132" height="13" rx="6.5" fill="rgba(255,255,255,0.52)"/>
    <rect x="88"  y="592" width="98"  height="10" rx="5"   fill="rgba(255,255,255,0.34)"/>
    <rect x="72"  y="617" width="66"  height="8"  rx="4"   fill="rgba(255,255,255,0.19)"/>
    <circle cx="545" cy="268" r="7"  fill="white" filter="url(#glow2)"/>
    <circle cx="545" cy="268" r="16" fill="rgba(255,255,255,0.22)"/>
    <circle cx="545" cy="268" r="28" fill="rgba(255,255,255,0.09)"/>
    <path d="M545,256 L547,265 L558,268 L547,271 L545,280 L543,271 L532,268 L543,265 Z"
          fill="rgba(255,255,255,0.85)"/>
  </g>

  <!-- ─── Wordmark ─── -->
  <!-- "Post" — indigo -->
  <text
    x="415" y="228"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="118"
    font-weight="300"
    letter-spacing="-2"
    fill="url(#textGrad)">Post</text>

  <!-- "Pilot" — dark, bold -->
  <text
    x="657" y="228"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="118"
    font-weight="800"
    letter-spacing="-3"
    fill="#1e1b4b">Pilot</text>

  <!-- Tagline -->
  <text
    x="416" y="274"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="4"
    fill="#6366f1"
    text-anchor="start">SMART SOCIAL SCHEDULING</text>
</svg>
